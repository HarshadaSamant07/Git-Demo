<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="task-manager">
    <header class="page-header">
      <h1>Task Manager</h1>
      <p>Keep track of your daily tasks in one simple place.</p>
    </header>

    <section class="task-input-section" aria-label="Add a new task">
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="Enter a new task"
        aria-label="Task name"
      >
      <button id="addTaskButton" class="add-task-button" type="button">Add Task</button>
    </section>

    <section class="task-list-section" aria-label="Task list">
      <h2>Your Tasks</h2>
      <ul id="taskList" class="task-list"></ul>
      <p id="emptyState" class="empty-state">No tasks added yet.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
